<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UncleZero — Sign In</title>
  <style>
    :root {
      --bg-base:    #0d1117;
      --bg-card:    #161b22;
      --border:     #30363d;
      --text:       #e6edf3;
      --text-muted: #8b949e;
      --green:      #3fb950;
      --red:        #f85149;
      --red-bg:     rgba(248, 81, 73, 0.12);
      --blue:       #388bfd;
      --blue-hover: #58a6ff;
      --radius:     8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg-base);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Brand ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .brand-logo {
      width: 48px;
      height: 48px;
      background: var(--red);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 0 20px rgba(248, 81, 73, 0.3);
    }

    .brand-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .brand-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: -6px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 360px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
      color: var(--text-muted);
    }

    /* ── Form ── */
    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.15);
    }
    input::placeholder { color: var(--text-muted); opacity: 0.6; }

    /* ── Error Banner ── */
    .error-banner {
      display: none;
      background: var(--red-bg);
      border: 1px solid rgba(248, 81, 73, 0.3);
      border-radius: var(--radius);
      color: var(--red);
      font-size: 13px;
      padding: 10px 12px;
      margin-bottom: 16px;
      text-align: center;
    }
    .error-banner.visible { display: block; }

    /* ── Submit Button ── */
    button[type="submit"] {
      width: 100%;
      margin-top: 6px;
      padding: 10px;
      background: var(--blue);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    button[type="submit"]:hover   { background: var(--blue-hover); }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Footer ── */
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="brand">
    <div class="brand-logo">&#x1F525;</div>
    <div class="brand-name">UncleZero</div>
    <div class="brand-sub">Gas Pressure Monitor</div>
  </div>

  <div class="card">
    <div class="card-title">Sign in to your account</div>

    <div class="error-banner" id="error-banner"></div>

    <form id="login-form">
      <div class="field">
        <label for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          placeholder="admin"
          required
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" id="submit-btn">Sign In</button>
    </form>
  </div>

  <div class="footer">MagmaTeam &copy; 2026</div>

  <script>
    const form       = document.getElementById('login-form');
    const submitBtn  = document.getElementById('submit-btn');
    const errorBanner = document.getElementById('error-banner');

    function showError(message) {
      errorBanner.textContent = message;
      errorBanner.classList.add('visible');
    }

    function hideError() {
      errorBanner.classList.remove('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        const res = await fetch('/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (res.ok) {
          // Server set the httpOnly JWT cookie — redirect to the dashboard
          window.location.href = '/';
        } else {
          showError(data.error || 'Login failed. Please try again.');
        }
      } catch {
        showError('Could not reach the server. Check your connection.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
